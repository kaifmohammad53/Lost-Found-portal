<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="./stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
        </div>
        <div class="panels">
            <p><i class="fa-solid fa-house"></i>Dashboard</p>
            <p><i class="fa-solid fa-box-open"></i>Report Lost Item</p>
            <p><i class="fa-solid fa-gift"></i>Report Found Item</p>
            <p><i class="fa-solid fa-file-lines"></i>My Reports</p>
            <p><i class="fa-solid fa-bell"></i>Notifications</p>
            <p><i class="fa-solid fa-comments"></i>Messages</p>
            <p><i class="fa-solid fa-user"></i>Profile</p>
            <p><i class="fa-solid fa-gear"></i>Setting</p>
            <p><i class="fa-solid fa-right-from-bracket"></i>Logout</p>
        </div>
        <div class="motivation-img">
            <!-- <img src="./motivation-l&f.png" alt="motivation"> -->
        </div>
    </div>
    <div class="navbar">
        <div class="navbar-l">
            <button>Dashboard</button>
            <button>Report Lost</button>
            <button>Report Found</button>
            <button>Browse Items</button>
        </div>
        <div class="navbar-r">
            <i class="fa-solid fa-bell"></i>
            <p>|</p>
            <i class="fa-solid fa-circle-user"></i>
            <p>Use</p>
            <i class="fa-solid fa-caret-down"></i>
        </div>
    </div>
    <script src="./javascript.js"></script>
</body>
</html>
