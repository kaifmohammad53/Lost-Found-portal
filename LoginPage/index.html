<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="/LoginPage/stylesheet.css">
</head>
<body>
    <div class="container">
        <div class="image">
            <div class="overlay">
                <img class="logo" src="/homepage/images/logo.png">
                <p>Helping our campus community reconnect with what matters.</p>
            </div>
            <img class="bg-img" src="/LoginPage/bg.png">
        </div>
        <div class="login">
            <div class="box">
                <p>New Here <button>Create Account</button></p>
                <i></i>
                <h1>welcome Back</h1>
                <p>Login to create your account</p>
                <div class="email">
                    <p>Email or Phone</p>
                    <input type="text" placeholder="your email or phone number">
                </div>
                <div class="passwd">
                    <p>Password</p>
                    <input type="password" placeholder="enter your pass word">
                </div>
                <input class="remember">
                    <a href="#">Forgot Password?</a>
                    <input type="checkbox">remember me</div>
                </div>
                <div class="button">
                    <button>Login</button>
                </div>
                <p>or continue with</p>
                <div class="continue">
                    <button>
                        <i></i>
                        <p>Google</p>
                    </button>
                    <button>
                        <i></i>
                        <p>Microsoft</p>
                    </button>
                </div>
                <p>Your Information is secure with us</p>
            </div>
        </div>
    </div>
    <script src="/LoginPage/script.js"></script>
</body>
</html>
