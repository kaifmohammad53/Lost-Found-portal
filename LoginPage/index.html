<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="/LoginPage/stylesheet.css">
</head>
<body>
    <div class="container">
        <div class="image">
            <div class="overlay">
                <img class="logo" src="/homepage/images/logo.png">
                <p>Helping our campus community reconnect with what matters.</p>
            </div>
            <img class="bg-img" src="/LoginPage/bg.png">
        </div>
    <div class="login">
        <div class="box">

        <p>New Here? <a href="#">Create Account</a></p>

        <h1>Welcome Back</h1>
        <p>Login to your account</p>

        <div class="email">
            <p>Email or Phone</p>
            <input type="text" placeholder="Your email or phone number">
        </div>

        <div class="passwd">
            <p>Password</p>
            <input type="password" placeholder="Enter your password">
        </div>

        <div class="remember">
            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>
        </div>

        <div class="button">
            <button>Login</button>
        </div>

        <p class="divider">or continue with</p>

        <div class="continue">
            <button>Google</button>
            <button>Microsoft</button>
        </div>

        <p class="secure">🔒 Your information is secure with us.</p>

    </div>
</div>
    </div>
    <script src="/LoginPage/script.js"></script>
</body>
</html>
