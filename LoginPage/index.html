<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="/LoginPage/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="image">
            <div class="overlay">
                <img class="logo" src="/homepage/images/logo.png">
                <p>Helping our campus community reconnect with what matters.</p>
            </div>
            <img class="bg-img" src="/LoginPage/bg.png">
        </div>
    <div class="login">
        <div class="box">
            <div class="para">
                 <p id=".para">New Here?
                 <a id="newReg" href="/registrationPage/index.html" style="text-decoration: none;color: green;">Create Account</a></p>
            </div>
            <div class="lock">
                <i class="fa-solid fa-user-lock"></i>
            </div>
            <div class="header">
                <h1>Welcome Back!</h1>
                <p>Login to continue to your account</p>
            </div>
            <div class="email">
                <p><i class="fa-solid fa-user"></i> Email or Phone</p>
                <input class="input"  type="text" placeholder="Enter Your email or phone number">
            </div>
            <div class="passwd">
                <p><i class="fa-solid fa-lock"></i>Password</p>
                <input class="input" type="password" placeholder="Enter your password">
            </div>
            <div class="remember">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>
                <a href="#">Forgot Password?</a>
            </div>
            <div class="button">
                <button>Login</button>
            </div>
            <p class="divider">or continue with</p>
            <div class="continue">
                <button>
                    <img src="/LoginPage/google-logo.jpg" alt="Google">
                    Google
                </button>
                <button>
                    <img src="/LoginPage/microsoft-logo.png" alt="Microsoft">
                    Microsoft
                </button>
            </div>
            <p class="secure">🔒 Your information is secure with us.</p>

        </div>
    </div>
    </div>
    <script src="/LoginPage/script.js"></script>
</body>
</html>
