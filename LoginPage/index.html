<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="/LoginPage/stylesheet.css">
</head>
<body>
    <div class="container">
        <div class="image">
            <div class="overlay">
                <img class="logo" src="/homepage/images/logo.png">
                <p>Helping our campus community reconnect with what matters.</p>
            </div>
            <img class="bg-img" src="/LoginPage/bg.png">
        </div>
        <div class="login">
            <p>New Here <button>Create Account</button></p>
            <div class="box">
                <i></i>
                <h1>welcome Back</h1>
                <p>Login to create your account</p>
                <div class="email">
                    <p>Email or Phone</p>
                    <input type="text" placeholder="your email or phone number">
                </div>
                <div class="passwd">
                    <p>Password</p>
                    <input type="password" placeholder="enter your pass word">
                </div>
                <div class="remember">
                    <a href="#">Forgot Password?</a>
                    
                </div>
                
            </div>
        </div>
    </div>
    <script src="/LoginPage/script.js"></script>
</body>
</html>
