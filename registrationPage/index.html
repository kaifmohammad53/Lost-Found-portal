<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found</title>
    <link rel="stylesheet" href="/registrationPage/stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="image">
            <div class="overlay">
                <img class="logo" src="/homepage/images/logo.png">
            </div>
            <div class="header">
                <p>Join Our Trusted Campus Community</p>
            </div>
            <img class="bg-img" src="/registrationPage/cover.png">
        </div>
        <div class="register">
            <div class="box">
                <div class="para">
                     <p id=".para">Alraedy have an Account?
                     <a id="login" href="/LoginPage/index.html" style="text-decoration: none;color: green;">Login</a></p>
                </div>
                <div class="plus">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <div class="heading">
                    <h1>Create Your Account</h1>
                    <p>Start Helping Your Campus Recover Lost Belonging</p>
                </div>
    
    
                <div class="button">
                    <button>Create your Account</button>
                </div>
            <p class="divider">or continue with</p>
            <div class="continue">
                <button>
                    <img src="/LoginPage/google-logo.jpg" alt="Google">
                    Google
                </button>
                <button>
                    <img src="/LoginPage/microsoft-logo.png" alt="Microsoft">
                    Microsoft
                </button>
            </div>
            <p class="secure">🔒 Your information is secure with us.</p>

        </div>
    </div>
    </div>
    <script src="/registrationPage/script.js"></script>
</body>
</html>
